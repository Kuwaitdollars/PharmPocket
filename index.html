<!DOCTYPE html>
<html>

<head>
<title>PharmPocket</title>
</head>

<body>

<h1>PharmPocket</h1>

<h3>Search Drug</h3>

<input type="text" id="searchInput" placeholder="Search drug">

<button onclick="searchDrug()">Search</button>

<h3>Results</h3>

<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
<h2>Disease Drug Finder</h2>

<input type="text" id="diseaseInput" placeholder="Enter disease (e.g malaria)">
<button onclick="findDrugs()">Find Drugs</button>

<div id="diseaseResults"></div>

<script>
function findDrugs(){

let disease = document.getElementById("diseaseInput").value.toLowerCase();

let results = drugs.filter(drug =>
drug.indications.toLowerCase().includes(disease)
);

let output="";

results.forEach(d=>{
output += `
<div class="drugCard">
<h3>${d.name}</h3>
<p><b>Class:</b> ${d.class}</p>
<p><b>Indications:</b> ${d.indications}</p>
<p><b>Adult Dose:</b> ${d.adultDose}</p>
<p><b>Pediatric Dose:</b> ${d.pediatricDose}</p>
<p><b>Route:</b> ${d.route}</p>
</div>
`;
});

document.getElementById("diseaseResults").innerHTML = output;
}
</script>
<h2>Pediatric Dose Calculator</h2>

<input type="number" id="weight" placeholder="Enter weight in kg">

<select id="drugDose">
<option value="10">Paracetamol (10 mg/kg)</option>
<option value="20">Amoxicillin (20 mg/kg)</option>
<option value="5">Gentamicin (5 mg/kg)</option>
<option value="15">Ceftriaxone (15 mg/kg)</option>
<option value="1">Diazepam (1 mg/kg)</option>
</select>

<button onclick="calculateDose()">Calculate</button>

<h3 id="doseResult"></h3>

<script>
function calculateDose(){

let weight = document.getElementById("weight").value;

let dosePerKg = document.getElementById("drugDose").value;

let result = weight * dosePerKg;

document.getElementById("doseResult").innerHTML =
"Recommended Dose: " + result + " mg";
}
</script>
<h2>Drug Interaction Checker</h2>

<input type="text" id="drug1" placeholder="First Drug">
<input type="text" id="drug2" placeholder="Second Drug">

<button onclick="checkInteraction()">Check Interaction</button>

<p id="interactionResult"></p>

<script>

const interactions = [

{a:"warfarin",b:"aspirin",effect:"High bleeding risk"},

{a:"rifampicin",b:"oral contraceptives",effect:"Reduced contraceptive effect"},

{a:"metformin",b:"contrast dye",effect:"Risk of lactic acidosis"},

{a:"gentamicin",b:"furosemide",effect:"Increased ototoxicity"}

];

function checkInteraction(){

let d1 = document.getElementById("drug1").value.toLowerCase();
let d2 = document.getElementById("drug2").value.toLowerCase();

let found = interactions.find(i =>
(i.a==d1 && i.b==d2) || (i.a==d2 && i.b==d1)
);

if(found){

document.getElementById("interactionResult").innerHTML =
"⚠ Interaction: " + found.effect;

}

else{

document.getElementById("interactionResult").innerHTML =
"No major interaction found";

}

}

  </script>
  <div id="drugDetails" style="display:none; border:1px solid gray; padding:15px; margin-top:20px;">
<h2 id="dName"></h2>

<p><b>Class:</b> <span id="dClass"></span></p>
<p><b>Indications:</b> <span id="dInd"></span></p>
<p><b>Adult Dose:</b> <span id="dAdult"></span></p>
<p><b>Pediatric Dose:</b> <span id="dPed"></span></p>
<p><b>Neonatal Dose:</b> <span id="dNeo"></span></p>
<p><b>Route:</b> <span id="dRoute"></span></p>
<p><b>Side Effects:</b> <span id="dSide"></span></p>

<button onclick="closeDrug()">Close</button>

  </div>
