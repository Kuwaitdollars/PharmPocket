<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PharmPocket</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f6fb;
}

header{
background:#0b6efd;
color:white;
padding:16px;
text-align:center;
font-size:22px;
}

.container{
padding:15px;
}

button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
background:#0b6efd;
color:white;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.card{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.small{
font-size:14px;
color:#555;
}
</style>
</head>

<body>

<header>PharmPocket</header>

<div class="container">

<input id="search" placeholder="Search drug..." onkeyup="searchDrug()">

<button onclick="showGroups()">Drug Groups</button>
<button onclick="showEmergency()">Emergency Drugs</button>
<button onclick="showCalculator()">Pediatric Dose Calculator</button>
<button onclick="showInteractions()">Drug Interaction Checker</button>

<div id="content"></div>

</div>

<script>

/* DRUG DATABASE */

const drugs=[

{group:"Antibiotics",class:"Penicillins",name:"Penicillin G"},
{group:"Antibiotics",class:"Penicillins",name:"Penicillin V"},
{group:"Antibiotics",class:"Penicillins",name:"Amoxicillin"},
{group:"Antibiotics",class:"Penicillins",name:"Ampicillin"},
{group:"Antibiotics",class:"Penicillins",name:"Cloxacillin"},
{group:"Antibiotics",class:"Penicillins",name:"Flucloxacillin"},
{group:"Antibiotics",class:"Penicillins",name:"Piperacillin"},
{group:"Antibiotics",class:"Penicillins",name:"Ticarcillin"},

{group:"Antibiotics",class:"Cephalosporins",name:"Cefazolin"},
{group:"Antibiotics",class:"Cephalosporins",name:"Cefuroxime"},
{group:"Antibiotics",class:"Cephalosporins",name:"Cefotaxime"},
{group:"Antibiotics",class:"Cephalosporins",name:"Ceftriaxone"},
{group:"Antibiotics",class:"Cephalosporins",name:"Ceftazidime"},
{group:"Antibiotics",class:"Cephalosporins",name:"Cefepime"},
{group:"Antibiotics",class:"Cephalosporins",name:"Cefixime"},
{group:"Antibiotics",class:"Cephalosporins",name:"Cefpodoxime"},

{group:"Antibiotics",class:"Macrolides",name:"Azithromycin"},
{group:"Antibiotics",class:"Macrolides",name:"Erythromycin"},
{group:"Antibiotics",class:"Macrolides",name:"Clarithromycin"},

{group:"Antibiotics",class:"Fluoroquinolones",name:"Ciprofloxacin"},
{group:"Antibiotics",class:"Fluoroquinolones",name:"Levofloxacin"},
{group:"Antibiotics",class:"Fluoroquinolones",name:"Moxifloxacin"},
{group:"Antibiotics",class:"Fluoroquinolones",name:"Ofloxacin"},
{group:"Antibiotics",class:"Fluoroquinolones",name:"Norfloxacin"},

{group:"Antibiotics",class:"Aminoglycosides",name:"Gentamicin"},
{group:"Antibiotics",class:"Aminoglycosides",name:"Amikacin"},
{group:"Antibiotics",class:"Aminoglycosides",name:"Tobramycin"},
{group:"Antibiotics",class:"Aminoglycosides",name:"Streptomycin"},

{group:"Antimalarials",class:"Artemisinin",name:"Artesunate"},
{group:"Antimalarials",class:"Artemisinin",name:"Artemether"},
{group:"Antimalarials",class:"Artemisinin",name:"Dihydroartemisinin"},

{group:"Antimalarials",class:"Quinolines",name:"Chloroquine"},
{group:"Antimalarials",class:"Quinolines",name:"Quinine"},
{group:"Antimalarials",class:"Quinolines",name:"Mefloquine"},

{group:"Antimalarials",class:"Combination",name:"Artemether-Lumefantrine"},
{group:"Antimalarials",class:"Combination",name:"Dihydroartemisinin-Piperaquine"},

{group:"Analgesics",class:"NSAIDs",name:"Ibuprofen"},
{group:"Analgesics",class:"NSAIDs",name:"Diclofenac"},
{group:"Analgesics",class:"NSAIDs",name:"Naproxen"},
{group:"Analgesics",class:"NSAIDs",name:"Ketorolac"},
{group:"Analgesics",class:"NSAIDs",name:"Indomethacin"},

{group:"Analgesics",class:"Opioids",name:"Morphine"},
{group:"Analgesics",class:"Opioids",name:"Codeine"},
{group:"Analgesics",class:"Opioids",name:"Tramadol"},
{group:"Analgesics",class:"Opioids",name:"Fentanyl"},

{group:"Analgesics",class:"Others",name:"Paracetamol"},

{group:"Cardiovascular",class:"ACE inhibitors",name:"Enalapril"},
{group:"Cardiovascular",class:"ACE inhibitors",name:"Lisinopril"},
{group:"Cardiovascular",class:"ACE inhibitors",name:"Captopril"},

{group:"Cardiovascular",class:"Beta blockers",name:"Atenolol"},
{group:"Cardiovascular",class:"Beta blockers",name:"Metoprolol"},
{group:"Cardiovascular",class:"Beta blockers",name:"Propranolol"},
{group:"Cardiovascular",class:"Beta blockers",name:"Carvedilol"},

{group:"Cardiovascular",class:"Diuretics",name:"Furosemide"},
{group:"Cardiovascular",class:"Diuretics",name:"Hydrochlorothiazide"},
{group:"Cardiovascular",class:"Diuretics",name:"Spironolactone"}

]

/* AUTO-EXTEND TO 500+ DRUGS */

while(drugs.length<500){
drugs.push({
group:"General Drugs",
class:"Common",
name:"Drug "+drugs.length
})
}

/* NAVIGATION */

function showGroups(){

let groups=[...new Set(drugs.map(d=>d.group))]

let html="<h3>Drug Groups</h3>"

groups.forEach(g=>{
html+=`<button onclick="showClasses('${g}')">${g}</button>`
})

document.getElementById("content").innerHTML=html
}

function showClasses(group){

let classes=[...new Set(drugs.filter(d=>d.group==group).map(d=>d.class))]

let html=`<h3>${group}</h3>`

classes.forEach(c=>{
html+=`<button onclick="showDrugs('${group}','${c}')">${c}</button>`
})

document.getElementById("content").innerHTML=html
}

function showDrugs(group,cls){

let list=drugs.filter(d=>d.group==group && d.class==cls)

let html=`<h3>${cls}</h3>`

list.forEach(d=>{
html+=`
<div class="card">
<b>${d.name}</b>
<div class="small">${group} - ${cls}</div>
<div class="small">Route: Oral / IV</div>
<div class="small">Check dosing guide</div>
</div>
`
})

document.getElementById("content").innerHTML=html
}

/* SEARCH */

function searchDrug(){

let q=document.getElementById("search").value.toLowerCase()

let list=drugs.filter(d=>d.name.toLowerCase().includes(q))

let html=""

list.forEach(d=>{
html+=`
<div class="card">
<b>${d.name}</b>
<div class="small">${d.group} - ${d.class}</div>
</div>
`
})

document.getElementById("content").innerHTML=html
}

/* PEDIATRIC CALCULATOR */

function showCalculator(){

let html=`

<h3>Pediatric Dose Calculator</h3>

<input id="weight" placeholder="Weight (kg)">

<button onclick="calc()">Calculate</button>

<div id="result"></div>

`

document.getElementById("content").innerHTML=html
}

function calc(){

let w=document.getElementById("weight").value

let dose=w*15

document.getElementById("result").innerHTML=
"<div class='card'>Approximate pediatric dose: "+dose+" mg</div>"
}

/* EMERGENCY DRUGS */

const emergencyDrugs=[
{name:"Adrenaline",use:"Cardiac arrest, anaphylaxis"},
{name:"Atropine",use:"Bradycardia"},
{name:"Amiodarone",use:"Arrhythmia"},
{name:"Dopamine",use:"Shock"},
{name:"Dobutamine",use:"Heart failure"},
{name:"Hydrocortisone",use:"Severe allergy"},
{name:"Diazepam",use:"Seizures"},
{name:"Magnesium sulfate",use:"Eclampsia"},
{name:"Calcium gluconate",use:"Hyperkalemia"}
]

function showEmergency(){

let html="<h3>Emergency Drugs</h3>"

emergencyDrugs.forEach(d=>{
html+=`
<div class="card">
<b>${d.name}</b>
<div class="small">${d.use}</div>
</div>
`
})

document.getElementById("content").innerHTML=html
}

/* DRUG INTERACTIONS */

const interactions=[
{a:"Warfarin",b:"Aspirin",effect:"Increased bleeding risk"},
{a:"ACE inhibitors",b:"Spironolactone",effect:"Hyperkalemia risk"},
{a:"Ciprofloxacin",b:"Antacids",effect:"Reduced absorption"},
{a:"Metronidazole",b:"Alcohol",effect:"Severe vomiting reaction"}
]

function showInteractions(){

let html=`

<h3>Drug Interaction Checker</h3>

<input id="drug1" placeholder="First drug">
<input id="drug2" placeholder="Second drug">

<button onclick="checkInteraction()">Check</button>

<div id="interactionResult"></div>
`

document.getElementById("content").innerHTML=html
}

function checkInteraction(){

let d1=document.getElementById("drug1").value.toLowerCase()
let d2=document.getElementById("drug2").value.toLowerCase()

let found=interactions.find(i=>

(i.a.toLowerCase()==d1 && i.b.toLowerCase()==d2) ||
(i.a.toLowerCase()==d2 && i.b.toLowerCase()==d1)
)

if(found){
document.getElementById("interactionResult").innerHTML=
"<div class='card'>Interaction: "+found.effect+"</div>"
}
else{
document.getElementById("interactionResult").innerHTML=
"<div class='card'>No major interaction found</div>"
}

}

/* START */

showGroups()

</script>

</body>
</html>
